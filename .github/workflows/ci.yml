name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  typecheck-and-test:
    name: Typecheck & Worker Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc -b --noEmit

      - name: Run worker unit tests
        run: |
          node tests/test_formula_fix.mjs
          node tests/test_selection.mjs
        env:
          NODE_OPTIONS: '--experimental-vm-modules'
